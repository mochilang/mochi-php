name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (Go ${{ matrix.go }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - go: "1.24"
            os: ubuntu-latest
          - go: stable
            os: ubuntu-latest
          - go: stable
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        if: runner.os == 'Linux'
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -race -timeout 120s

      - name: Vet
        run: go vet ./...

      - name: Build (transpiler)
        working-directory: transpiler
        run: go build ./...

      - name: Test (transpiler)
        working-directory: transpiler
        run: go test ./... -count=1 -race -timeout 120s

      - name: Vet (transpiler)
        working-directory: transpiler
        run: go vet ./...
