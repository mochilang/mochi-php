name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - go: "1.24"
            os: ubuntu-latest
          - go: stable
            os: ubuntu-latest
          - go: stable
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        if: runner.os == 'Linux'
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: none

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -race -timeout 120s

      - name: Vet
        run: go vet ./...
